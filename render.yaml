services:
  - type: web
    name: attendance-crm-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://attendance-crm-client.onrender.com
      - key: MONGODB_URI
        sync: false
  - type: web
    name: attendance-crm-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://attendance-crm-server.onrender.com/api
